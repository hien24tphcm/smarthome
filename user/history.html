<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử - MyHome</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- CSS CHO NÚT ĐỔI MÀU SÁNG TỐI --- */
        .theme-toggle {
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-secondary);
            transition: color 0.3s;
        }
        .theme-toggle:hover { color: var(--text-primary); }
        
        /* Ghi đè biến hệ thống cho Chế độ Sáng (Light Mode) */
        body.light-mode {
            --bg-color: #f4f7fe;
            --card-bg: #ffffff;
            --text-primary: #2b2b36;
            --text-secondary: #6c7293;
            --sidebar-bg: #ffffff;
            --border-color: #e2e5ec;
            --danger-color: #ff4d4d;
        }
        
        body.light-mode .card, body.light-mode .dashboard-section {
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border-color: var(--border-color);
        }

        /* --- ÉP NỀN TRẮNG DỨT ĐIỂM CHO LIGHT MODE --- */
        body.light-mode,
        body.light-mode .dashboard-container,
        body.light-mode .main-content,
        body.light-mode .page-content {
            background-color: #f4f7fe !important;
            color: #2b2b36 !important;
        }

        body.light-mode .sidebar { border-right: 1px solid var(--border-color); box-shadow: 2px 0 10px rgba(0,0,0,0.02); }
        body.light-mode .header { border-bottom: 1px solid var(--border-color); background: #f4f7fe !important; }
        body.light-mode .timeline-content { box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-color: var(--border-color); background: var(--card-bg); }

        /* --- CSS CHO DROPDOWN CHUÔNG THÔNG BÁO --- */
        .notif-dropdown { display: none; }
        .notif-dropdown.show { display: block; }
    </style>
</head>
<body class="dark-mode">
    <div class="dashboard-container">
        
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-house-user"></i>
                <h2>MyHome</h2>
            </div>
            <nav class="menu">
                <a href="index.html"><i class="fa-solid fa-border-all"></i> Tổng quan</a>
                <a href="history.html" class="active"><i class="fa-solid fa-clock-rotate-left"></i> Lịch sử</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="greeting">
                    <p>Nhật ký hệ thống</p>
                    <h3>Lịch sử hoạt động</h3>
                </div>
                <div class="user-actions">
                    <!-- Nút Dark/Light Mode -->
                    <div class="theme-toggle" id="theme-toggle" title="Đổi giao diện">
                        <i class="fa-solid fa-moon"></i>
                    </div>

                    <!-- ĐÃ SỬA: Thêm ID và khung cho chuông thông báo để JS không bị lỗi -->
                    <div class="notification" id="notif-bell" style="position: relative; cursor: pointer;">
                        <i class="fa-solid fa-bell"></i>
                        <div id="notif-dropdown" class="notif-dropdown" style="position: absolute; right: 0; top: 35px; width: 320px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); z-index: 100; text-align: left;">
                            <div style="padding: 12px; font-weight: bold; border-bottom: 1px solid var(--border-color); text-align: center; color: var(--text-primary);">Thông báo hệ thống</div>
                            <div id="notif-list" style="max-height: 300px; overflow-y: auto;"></div>
                        </div>
                    </div>

                    <div class="user-avatar" onclick="API.logout()" style="cursor:pointer;"><i class="fa-solid fa-right-from-bracket"></i></div>
                </div>
            </header>

            <div class="page-content">
                <!-- THANH CÔNG CỤ LỌC -->
                <div class="filters-container" style="display: flex; gap: 15px; margin-bottom: 20px; padding: 15px; background: var(--card-bg); border-radius: 10px; border: 1px solid var(--border-color); flex-wrap: wrap;">
                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <label for="filter-date" style="color: var(--text-secondary); font-size: 0.9rem;">Lọc theo ngày:</label>
                        <input type="date" id="filter-date" style="padding: 8px; border: 1px solid var(--border-color); border-radius: 5px; background: var(--bg-color); color: var(--text-primary); outline: none;">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <label for="filter-type" style="color: var(--text-secondary); font-size: 0.9rem;">Lọc theo loại:</label>
                        <select id="filter-type" style="padding: 8px; border: 1px solid var(--border-color); border-radius: 5px; background: var(--bg-color); color: var(--text-primary); outline: none; min-width: 150px;">
                            <option value="all">Tất cả</option>
                            <!-- Các option sẽ được render tự động bằng JS -->
                        </select>
                    </div>
                    <div style="display: flex; align-items: flex-end;">
                        <button id="reset-filter" style="padding: 9px 15px; border-radius: 5px; background: var(--text-secondary); color: white; border: none; cursor: pointer; transition: 0.3s;">
                            <i class="fa-solid fa-rotate-right"></i> Xóa bộ lọc
                        </button>
                    </div>
                </div>

                <!-- KHU VỰC HIỂN THỊ LOGS -->
                <div class="timeline-container" id="log-display-area">
                    <div class="loading-text" style="text-align: center; color: var(--text-secondary); margin-top: 50px;">
                        <i class="fas fa-spinner fa-spin"></i> Đang tải nhật ký hệ thống...
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="api.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        // --- XỬ LÝ GIAO DIỆN SÁNG/TỐI (DARK/LIGHT MODE) ---
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        
        const currentTheme = localStorage.getItem('theme') || 'dark';
        if (currentTheme === 'light') {
            body.classList.add('light-mode');
            themeToggle.innerHTML = '<i class="fa-solid fa-sun"></i>';
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            if (body.classList.contains('light-mode')) {
                localStorage.setItem('theme', 'light');
                themeToggle.innerHTML = '<i class="fa-solid fa-sun"></i>';
            } else {
                localStorage.setItem('theme', 'dark');
                themeToggle.innerHTML = '<i class="fa-solid fa-moon"></i>';
            }
        });

        // --- XỬ LÝ CHUÔNG THÔNG BÁO ---
        const notifBell = document.getElementById('notif-bell');
        const notifDropdown = document.getElementById('notif-dropdown');
        const notifList = document.getElementById('notif-list');

        notifBell.addEventListener('click', async (e) => {
            e.stopPropagation();
            notifDropdown.classList.toggle('show');
            
            if (notifDropdown.classList.contains('show')) {
                notifList.innerHTML = '<div style="text-align:center; padding:10px;"><i class="fas fa-spinner fa-spin"></i> Đang tải...</div>';
                try {
                    const logs = await API.getLogs(5);
                    notifList.innerHTML = '';
                    if (!logs || logs.length === 0) {
                        notifList.innerHTML = '<div style="padding:10px;text-align:center;color:var(--text-secondary);">Không có thông báo mới</div>';
                        return;
                    }
                    
                    logs.forEach(log => {
                        const descLowerCase = log.description ? log.description.toLowerCase() : '';
                        const isAlert = descLowerCase.includes('cảnh báo') || descLowerCase.includes('vượt ngưỡng') || descLowerCase.includes('deleted');
                        const icon = isAlert ? '<i class="fa-solid fa-triangle-exclamation alert" style="color: var(--danger-color);"></i>' : '<i class="fa-solid fa-circle-info info" style="color: #4dacff;"></i>';

                        const timeValue = log.created_at || log.timestamp || log.createdAt || log.time;
                        let displayTime = 'Chưa có thời gian';
                        
                        if (timeValue) {
                            let safeString = String(timeValue);
                            if (safeString.includes('T') && !safeString.endsWith('Z') && !safeString.match(/[+-]\d{2}:\d{2}$/)) {
                                safeString += 'Z'; 
                            }
                            const dateObj = new Date(safeString);
                            
                            if (!isNaN(dateObj.getTime())) {
                                const timeStr = dateObj.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
                                const dateStr = dateObj.toLocaleDateString('vi-VN');
                                displayTime = `${timeStr} - ${dateStr}`; 
                            }
                        }

                        notifList.innerHTML += `
                            <div class="notif-item" style="display: flex; gap: 10px; padding: 12px; border-bottom: 1px solid var(--border-color);">
                                <div style="font-size: 1.2rem; margin-top: 2px;">${icon}</div>
                                <div>
                                    <div style="line-height: 1.4; color: var(--text-primary); font-size: 0.95rem;">${log.description || 'Hành động hệ thống'}</div>
                                    <small style="color:var(--text-secondary); margin-top:5px; display:flex; align-items: center; gap: 5px;">
                                        <i class="fa-regular fa-clock"></i> ${displayTime}
                                    </small>
                                </div>
                            </div>
                        `;
                    });
                } catch (err) {
                    notifList.innerHTML = '<div style="padding:10px;text-align:center;color:var(--danger-color);">Lỗi tải thông báo</div>';
                }
            }
        });

        // Ẩn thông báo khi click ra ngoài
        document.addEventListener('click', (e) => {
            if (!notifBell.contains(e.target)) {
                notifDropdown.classList.remove('show');
            }
        });

        // --- XỬ LÝ LOAD VÀ LỌC LỊCH SỬ ---
        const logContainer = document.getElementById('log-display-area');
        const filterDate = document.getElementById('filter-date');
        const filterType = document.getElementById('filter-type');
        const resetFilterBtn = document.getElementById('reset-filter');
        
        let allLogs = [];

        async function loadSystemHistory() {
            try {
                const logs = await API.getLogs(); 

                if (logs && logs.length > 0) {
                    allLogs = logs;
                    populateTypeFilter(allLogs);
                    renderLogs(allLogs);         
                } else {
                    renderEmptyState();
                }
            } catch (error) {
                logContainer.innerHTML = `
                    <div style="text-align: center; padding: 50px; color: var(--danger-color, #ff4d4d);">
                        <i class="fa-solid fa-triangle-exclamation" style="font-size: 40px; margin-bottom: 15px;"></i>
                        <p>Không thể tải nhật ký. Vui lòng kiểm tra kết nối Backend.</p>
                    </div>`;
            }
        }

        function renderLogs(logsData) {
            logContainer.innerHTML = ''; 
            
            if (!logsData || logsData.length === 0) {
                renderEmptyState();
                return;
            }

            const timeline = document.createElement('div');
            timeline.className = 'timeline';

            logsData.forEach(log => {
                const timeValue = log.created_at || log.timestamp || log.createdAt || log.time;

                const logItem = `
                    <div class="timeline-item">
                        <div class="timeline-icon system">
                            <i class="fa-solid fa-circle-info" style="color: #4dacff;"></i>
                        </div>
                        <div class="timeline-content card" style="padding: 15px;">
                            <div class="log-header" style="display: flex; justify-content: space-between; align-items: center;">
                                <h4 style="color: var(--text-primary); margin: 0; font-size: 1rem;">${log.description || log.action || 'Không rõ hành động'}</h4> 
                                <span class="time" style="background: rgba(126, 130, 153, 0.1); padding: 4px 10px; border-radius: 6px; color: var(--text-secondary); font-size: 0.85rem;">${formatTime(timeValue)}</span>
                            </div>
                            <p class="log-desc" style="color: var(--text-secondary); margin-top: 8px; font-size: 0.9rem;">Loại: <strong style="color: var(--text-primary);">${log.type || 'Hệ thống'}</strong></p>
                        </div>
                    </div>
                `;
                timeline.innerHTML += logItem;
            });
            logContainer.appendChild(timeline);
        }

        function renderEmptyState() {
            logContainer.innerHTML = `
                <div style="text-align: center; padding: 50px; color: var(--text-secondary);">
                    <i class="fa-solid fa-file-signature" style="font-size: 40px; margin-bottom: 15px;"></i>
                    <p>Không tìm thấy lịch sử hoạt động phù hợp.</p>
                </div>`;
        }

        function populateTypeFilter(logsData) {
            const types = new Set();
            logsData.forEach(log => {
                if (log.type) types.add(log.type.toLowerCase().trim());
            });

            filterType.innerHTML = '<option value="all">Tất cả hoạt động</option>';
            
            types.forEach(type => {
                const option = document.createElement('option');
                option.value = type;
                
                if (type === 'user action' || type === 'user_action') {
                    option.textContent = '👨‍💻 Người dùng (User Action)';
                } 
                else if (type === 'admin action' || type === 'admin_action') {
                    option.textContent = '🛡️ Quản trị viên (Admin Action)';
                } 
                else if (type === 'system') {
                    option.textContent = '⚙️ Hệ thống (System)';
                } 
                else if (type === 'error') {
                    option.textContent = '⚠️ Lỗi (Error)';
                }
                else {
                    option.textContent = '🔹 ' + type.charAt(0).toUpperCase() + type.slice(1).replace('_', ' '); 
                }
                
                filterType.appendChild(option);
            });
        }

        function applyFilters() {
            let filteredLogs = allLogs;
            const selectedDate = filterDate.value; 
            const selectedType = filterType.value;

            if (selectedDate) {
                filteredLogs = filteredLogs.filter(log => {
                    const timeValue = log.created_at || log.timestamp || log.createdAt || log.time;
                    if (!timeValue) return false;
                    
                    try {
                        let safeString = String(timeValue);
                        if (safeString.includes('T') && !safeString.endsWith('Z') && !safeString.match(/[+-]\d{2}:\d{2}$/)) {
                            safeString += 'Z'; 
                        }
                        
                        const logDateObj = new Date(safeString);
                        if (isNaN(logDateObj.getTime())) return false;
                        
                        const logDate = logDateObj.getFullYear() + '-' + 
                                       String(logDateObj.getMonth() + 1).padStart(2, '0') + '-' + 
                                       String(logDateObj.getDate()).padStart(2, '0');
                                       
                        return logDate === selectedDate;
                    } catch (e) {
                        return false;
                    }
                });
            }

            if (selectedType !== 'all') {
                filteredLogs = filteredLogs.filter(log => {
                    if (!log.type) return false;
                    return log.type.toLowerCase().trim() === selectedType;
                });
            }

            renderLogs(filteredLogs);
        }

        filterDate.addEventListener('change', applyFilters);
        filterType.addEventListener('change', applyFilters);
        resetFilterBtn.addEventListener('click', () => {
            filterDate.value = '';
            filterType.value = 'all';
            renderLogs(allLogs); 
        });

        function formatTime(isoString) {
            if (!isoString) return 'Chưa có dữ liệu ngày'; 
            let safeString = String(isoString);
            
            if (safeString.includes('T') && !safeString.endsWith('Z') && !safeString.match(/[+-]\d{2}:\d{2}$/)) {
                safeString += 'Z'; 
            }
            const date = new Date(safeString);
            if (isNaN(date.getTime())) return 'Định dạng thời gian lỗi'; 
            
            return date.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }) + ' - ' + date.toLocaleDateString('vi-VN');
        }

        loadSystemHistory();
    });
    </script>
</body>
</html>
