<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tổng quan - MyHome Dark Mode</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-house-user"></i>
                <h2>MyHome</h2>
            </div>
            <nav class="menu">
                <a href="index.html" class="active"><i class="fa-solid fa-border-all"></i> Tổng quan</a>
                <a href="history.html"><i class="fa-solid fa-clock-rotate-left"></i> Lịch sử</a>
                <a href="settings.html"><i class="fa-solid fa-gear"></i> Cài đặt</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="greeting">
                    <p>Chào buổi sáng,</p>
                    <h3>Nhà của bạn</h3>
                </div>
                <div class="user-actions">
                    <div class="notification has-alert"><i class="fa-solid fa-bell"></i></div>
                    <div class="user-avatar"><i class="fa-solid fa-user"></i></div>
                </div>
            </header>

            <div class="page-content">
                <div class="room-filter-bar">
                    <button class="filter-btn active" data-filter="all">Tất cả</button>
                    <button class="filter-btn" data-filter="living-room">Phòng Khách</button>
                    <button class="filter-btn" data-filter="kitchen">Nhà Bếp</button>
                    <button class="filter-btn" data-filter="bedroom">Phòng Ngủ</button>
                </div>
                
                <div class="widget-grid" id="device-container">
                    <div class="card room-status-card widget-item" data-room="living-room">
                        <div class="room-info">
                            <h2>Phòng Khách</h2>
                            <p class="humidity"><i class="fa-solid fa-droplet"></i> Độ ẩm: 45%</p>
                        </div>
                        <div class="temp-ring">
                            <div class="temp-inner">24&deg;</div>
                        </div>
                    </div>

                    <div class="card device-card widget-item" data-room="living-room">
                        <div class="device-info">
                            <div class="icon-box"><i class="fa-solid fa-lightbulb"></i></div>
                            <div class="device-name">Đèn trần <br><small class="text-muted">Phòng khách</small></div>
                        </div>
                        <label class="switch"><input type="checkbox" checked><span class="slider round"></span></label>
                    </div>

                    <div class="card device-card fan-card widget-item" data-room="living-room">
                        <div class="fan-top-row">
                            <div class="device-info">
                                <div class="icon-box"><i class="fa-solid fa-fan"></i></div>
                                <div class="device-name">Quạt máy<br><small class="text-muted">Phòng khách</small></div>
                            </div>
                            <div class="controls-wrapper">
                                <div class="mode-control">
                                    <button class="mode-btn " data-mode="auto">Auto</button>
                                    <button class="mode-btn active" data-mode="manual">Thủ công</button>
                                </div>
                                <label class="switch"><input type="checkbox" id="fan-switch"><span class="slider round"></span></label>
                            </div>
                        </div>
                        <input type="range" min="0" max="100" value="70" class="range-slider" id="fan-slider">
                    </div>

                    <div class="card door-card widget-item" data-room="living-room">
                        <h2>Cửa chính</h2>
                        <div class="door-actions">
                            <button class="door-btn active"><i class="fa-solid fa-lock-open"></i> Mở</button>
                            <button class="door-btn"><i class="fa-solid fa-lock"></i> Đóng</button>
                        </div>
                    </div>

                    <div class="card room-status-card alert-danger widget-item" data-room="kitchen">
                        <div class="room-info">
                            <h2>Nhà Bếp</h2>
                            <p class="humidity" style="color: var(--danger-color);"><i class="fa-solid fa-fire"></i> Vượt ngưỡng!</p>
                        </div>
                        <div class="temp-ring" style="background: conic-gradient(var(--danger-color) 0% 100%, transparent 100% 100%);">
                            <div class="temp-inner" style="color: var(--danger-color);">45&deg;</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
<script src="api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    const deviceContainer = document.getElementById('device-container');

    // --- 1. HÀM RENDER THIẾT BỊ ---
    async function loadDashboard() {
        try {
            const devices = await API.getDevices();
            if (!devices || devices.length === 0) {
                deviceContainer.innerHTML = '<p>Không tìm thấy thiết bị nào.</p>';
                return;
            }

            deviceContainer.innerHTML = ''; // Xóa trạng thái loading

            devices.forEach(device => {
                if (device.type === 'controller') {
                    // Nếu là Quạt (hoặc thiết bị có điều tốc)
                    if (device.name.toLowerCase().includes('quạt')) {
                        renderFanCard(device);
                    } else {
                        renderLightCard(device);
                    }
                } else if (device.type === 'sensor') {
                    renderSensorCard(device);
                }
            });
            
            setupFilters(); // Cài đặt lại bộ lọc sau khi render xong
        } catch (err) {
            deviceContainer.innerHTML = '<p>Lỗi kết nối Backend. Vui lòng đăng nhập lại.</p>';
        }
    }

    // --- 2. CÁC TEMPLATE WIDGET ---
    
    // Template Đèn / Công tắc đơn
    function renderLightCard(device) {
        const card = document.createElement('div');
        card.className = 'card device-card widget-item';
        card.setAttribute('data-room', 'living-room'); // Bạn có thể map từ device.zone_id nếu BE trả về
        
        card.innerHTML = `
            <div class="device-info">
                <div class="icon-box"><i class="fa-solid fa-lightbulb"></i></div>
                <div class="device-name">${device.name}<br><small class="text-muted">ID: ${device.id}</small></div>
            </div>
            <label class="switch">
                <input type="checkbox" class="toggle-btn" data-id="${device.id}" ${device.last_value == '1' ? 'checked' : ''}>
                <span class="slider round"></span>
            </label>
        `;
        
        // Sự kiện Bật/Tắt
        card.querySelector('.toggle-btn').addEventListener('change', async (e) => {
            const action = e.target.checked ? 'on' : 'off';
            await API.toggleDevice(device.id, action);
        });

        deviceContainer.appendChild(card);
    }

    // Template Quạt (Có Mode và Speed)
    function renderFanCard(device) {
        const card = document.createElement('div');
        card.className = 'card device-card fan-card widget-item';
        card.innerHTML = `
            <div class="fan-top-row">
                <div class="device-info">
                    <div class="icon-box"><i class="fa-solid fa-fan"></i></div>
                    <div class="device-name">${device.name}</div>
                </div>
                <div class="controls-wrapper">
                    <div class="mode-control">
                        <button class="mode-btn ${device.mode === 'auto' ? 'active' : ''}" data-id="${device.id}" data-mode="auto">Auto</button>
                        <button class="mode-btn ${device.mode === 'manual' ? 'active' : ''}" data-id="${device.id}" data-mode="manual">Thủ công</button>
                    </div>
                    <label class="switch">
                        <input type="checkbox" class="fan-switch" data-id="${device.id}" ${device.last_value > 0 ? 'checked' : ''}>
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
            <input type="range" min="0" max="100" value="${device.speed || 0}" class="range-slider fan-slider" data-id="${device.id}">
        `;

        // Logic điều khiển Mode
        card.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const mode = btn.dataset.mode;
                const success = await API.updateDeviceMode(device.id, mode);
                if (success) {
                    card.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    // Vô hiệu hóa slider nếu là Auto
                    card.querySelector('.fan-slider').disabled = (mode === 'auto');
                }
            });
        });

        // Logic Slider Tốc độ
        card.querySelector('.fan-slider').addEventListener('change', async (e) => {
            await API.setDeviceSpeed(device.id, e.target.value);
        });

        deviceContainer.appendChild(card);
    }

    // Template Cảm biến (Nhiệt độ/Độ ẩm)
    function renderSensorCard(device) {
        const card = document.createElement('div');
        card.className = 'card room-status-card widget-item';
        card.innerHTML = `
            <div class="room-info">
                <h2>${device.name}</h2>
                <p class="humidity"><i class="fa-solid fa-clock"></i> Cập nhật: vừa xong</p>
            </div>
            <div class="temp-ring">
                <div class="temp-inner">${device.last_value || 0}&deg;</div>
            </div>
        `;
        deviceContainer.appendChild(card);
    }

    // --- 3. LOGIC LỌC PHÒNG (SETUP SAU KHI LOAD) ---
    function setupFilters() {
        const filterBtns = document.querySelectorAll('.filter-btn');
        const widgetItems = document.querySelectorAll('.widget-item');

        filterBtns.forEach(btn => {
            btn.onclick = () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const filter = btn.dataset.filter;
                widgetItems.forEach(item => {
                    item.style.display = (filter === 'all' || item.dataset.room === filter) ? 'flex' : 'none';
                });
            };
        });
    }

    // Khởi tạo
    loadDashboard();
});
</script>
</body>
</html>
